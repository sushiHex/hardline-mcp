# Fresh-environment test matrix — the per-push gate.
# Runs on ubuntu + windows (the codex-discovery path handling is Windows-
# specific, and the subprocess adapters differ subtly across OSes) and on the
# supported Python floor plus a current release.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (fresh env)
        run: pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q
      - name: Import wires the FastMCP server
        # Don't launch the console script here: it's a stdio server that would
        # block on stdin. Importing proves the package + tool registration; the
        # pip install above proves the console-script entry point resolves.
        run: python -c "import hardline_mcp.server as s; assert s.mcp.name == 'hardline-mcp'; print('OK')"
